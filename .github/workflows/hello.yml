#This is workflow name 
name: Hello Workflow

#runs on an automatic trigger , whenever change is pushed to branch {deployment}
on: 
  push:
    branches: [main]
# these are the jobs inside workflow 
jobs:
  # this is the name of the job 
  greet:
    runs-on: ubuntu-latest
    steps:
      - name: say hello to users
        run: echo "Hello Dosto"
      - name: say hello to username
        run: echo "Hello $USER"
  details:
    runs-on: ubuntu-latest
    steps:
      - name: show what is version of docker and python etc
        run: docker --version && python --version
